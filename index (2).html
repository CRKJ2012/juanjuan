<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gorenje 出入库管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* ========== 启动页 ========== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .splash-logo {
            font-size: 72px;
            font-weight: 300;
            color: #fff;
            letter-spacing: 15px;
            opacity: 0;
            transform: translateY(30px);
            animation: logoFadeIn 2s ease forwards;
        }
        .splash-line {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e94560, transparent);
            margin-top: 20px;
            animation: lineExpand 1.5s ease 0.8s forwards;
        }
        /* 新增：更新状态文字 */
        .splash-status {
            color: #aaa;
            margin-top: 28px;
            font-size: 16px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 0.6s ease 1.6s forwards;
        }
        .splash-status .status-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #e94560;
            border-top-color: transparent;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            animation: spin 0.8s linear infinite;
        }
        .splash-status.fail .status-icon {
            border-color: #e94560;
            border-top-color: #e94560;
            animation: none;
            background: #e94560;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        .splash-status.fail .status-icon::after {
            content: "✕";
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 18px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .splash-copyright {
            position: absolute;
            bottom: 30px;
            color: #666;
            font-size: 12px;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }
        @keyframes logoFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes lineExpand {
            0% {
                width: 0;
            }
            100% {
                width: 300px;
            }
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* ========== 登录注册页 ========== */
        #auth-screen {
            display: none;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-title {
            color: #fff;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: #e94560;
            border-bottom-color: #e94560;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus {
            border-color: #e94560;
        }
        .form-group input::placeholder {
            color: #555;
        }
        .remember-box {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .remember-box input {
            margin-right: 8px;
        }
        .remember-box label {
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .auth-btn:hover {
            background: #d63850;
        }
        .auth-tip {
            color: #e94560;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        /* ========== 主系统 ========== */
        #main-system {
            display: none;
            width: 100%;
            height: 100vh;
        }
        .sidebar {
            width: 220px;
            height: 100%;
            background: #1a1a2e;
            float: left;
            overflow-y: auto;
            padding: 20px 0;
        }
        .sidebar-logo {
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 5px;
            padding: 10px 0 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }
        .menu-group {
            margin-bottom: 5px;
        }
        .menu-title {
            padding: 14px 20px;
            color: #ccc;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            transition: all 0.2s;
        }
        .menu-title:hover {
            background: rgba(233, 69, 96, 0.1);
            color: #fff;
        }
        .menu-title.active {
            background: rgba(233, 69, 96, 0.15);
            color: #e94560;
        }
        .menu-arrow {
            transition: transform 0.3s;
            font-size: 12px;
        }
        .menu-title.expanded .menu-arrow {
            transform: rotate(180deg);
        }
        .submenu {
            display: none;
            background: rgba(0, 0, 0, 0.2);
        }
        .submenu.open {
            display: block;
        }
        .submenu-item {
            padding: 12px 20px 12px 40px;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .submenu-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        .submenu-item.active {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
            border-left: 3px solid #e94560;
        }

        .main-content {
            margin-left: 220px;
            height: 100%;
            background: #f5f6fa;
            overflow-y: auto;
        }
        .content-header {
            background: #fff;
            padding: 18px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        .btn-primary:hover {
            background: #d63850;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        .btn-success:hover {
            background: #219a52;
        }
        .btn-default {
            background: #fff;
            color: #555;
            border: 1px solid #ddd;
        }
        .btn-default:hover {
            border-color: #e94560;
            color: #e94560;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        .content-body {
            padding: 20px 25px;
        }
        .toolbar {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar input,
        .toolbar select {
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .toolbar input:focus,
        .toolbar select:focus {
            border-color: #e94560;
        }

        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 6px;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th {
            background: #f8f9fa;
            padding: 12px 10px;
            text-align: left;
            font-weight: 500;
            color: #555;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        .data-table tr:hover {
            background: #fafafa;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>

    <!-- ===== 启动页 ===== -->
    <div id="splash-screen">
        <div class="splash-logo">GORENJE</div>
        <div class="splash-line"></div>
        <!-- 状态区域：动画过后显示“正在更新”，30秒后变为“更新失败！” -->
        <div class="splash-status" id="splashStatus">
            <span class="status-icon"></span>
            <span id="statusText">加载中...</span>
        </div>
        <div class="splash-copyright">灿然科技@2026 版权所有</div>
    </div>

    <!-- ===== 登录注册页 ===== -->
    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-title">GORENJE</div>
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>
            <div id="login-form">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" value="admin">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" value="123456">
                </div>
                <div class="remember-box">
                    <input type="checkbox" id="remember-me" checked>
                    <label for="remember-me">记住我</label>
                </div>
                <button class="auth-btn" id="login-btn">登 录</button>
                <div class="auth-tip" id="login-tip">用户名或密码错误</div>
            </div>
            <div id="register-form" style="display:none;">
                <div class="form-group">
                    <label>新账号</label>
                    <input type="text" id="reg-username" placeholder="请设置用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="请设置密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="reg-confirm" placeholder="再次输入密码">
                </div>
                <button class="auth-btn" id="register-btn">注 册</button>
                <div class="auth-tip" id="register-tip">注册失败，请检查信息</div>
            </div>
        </div>
    </div>

    <!-- ===== 主系统 ===== -->
    <div id="main-system">
        <div class="sidebar">
            <div class="sidebar-logo">GORENJE</div>
            <div class="menu-group">
                <div class="menu-title expanded" data-menu="dashboard">
                    <span>📊 仪表盘</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu open">
                    <div class="submenu-item active">总览</div>
                </div>
            </div>
            <div class="menu-group">
                <div class="menu-title expanded" data-menu="warehouse">
                    <span>📦 仓库管理</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu open">
                    <div class="submenu-item active">入库记录</div>
                    <div class="submenu-item">出库记录</div>
                    <div class="submenu-item">库存查询</div>
                </div>
            </div>
            <div class="menu-group">
                <div class="menu-title" data-menu="report">
                    <span>📈 报表</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu">
                    <div class="submenu-item">月度报表</div>
                    <div class="submenu-item">年度报表</div>
                </div>
            </div>
        </div>
        <div class="main-content">
            <div class="content-header">
                <div class="page-title">📋 入库记录</div>
                <div class="header-actions">
                    <button class="btn btn-primary btn-sm">+ 新增入库</button>
                    <button class="btn btn-success btn-sm">⬇ 导出Excel</button>
                </div>
            </div>
            <div class="content-body">
                <div class="toolbar">
                    <input type="text" placeholder="搜索商品名称..." style="flex:1; min-width:160px;">
                    <select><option>全部类型</option><option>电子产品</option><option>家具</option></select>
                    <select><option>全部状态</option><option>已入库</option><option>待审核</option></select>
                    <button class="btn btn-primary btn-sm">搜索</button>
                    <button class="btn btn-default btn-sm">重置</button>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr><th>ID</th><th>商品名称</th><th>类别</th><th>数量</th><th>入库时间</th><th>状态</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>1001</td><td>智能冰箱</td><td>家电</td><td>5</td><td>2026-06-27 10:30</td><td>已入库</td></tr>
                            <tr><td>1002</td><td>洗衣机</td><td>家电</td><td>3</td><td>2026-06-27 09:15</td><td>已入库</td></tr>
                            <tr><td>1003</td><td>微波炉</td><td>厨电</td><td>8</td><td>2026-06-26 16:20</td><td>待审核</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 启动页动画 + 更新状态逻辑
        // ==========================================
        (function splashSequence() {
            const splash = document.getElementById('splash-screen');
            const statusEl = document.getElementById('splashStatus');
            const statusText = document.getElementById('statusText');

            // 动画结束后 (logo + 线条动画约 2s + 1.5s = 3.5s 足够)
            // 在 3.8s 时显示“正在更新”
            setTimeout(() => {
                statusText.textContent = '正在更新...';
                statusEl.className = 'splash-status'; // 确保去掉 fail 类，保留旋转
                // 重新插入旋转图标 (因为 fail 类会替换结构)
                statusEl.innerHTML = `<span class="status-icon"></span><span id="statusText">正在更新...</span>`;
                // 重新获取引用
                const newStatusText = document.getElementById('statusText');
                // 启动 30 秒倒计时
                let seconds = 30;
                const interval = setInterval(() => {
                    seconds--;
                    if (seconds <= 0) {
                        clearInterval(interval);
                        // 显示更新失败！
                        statusEl.className = 'splash-status fail';
                        statusEl.innerHTML = `<span class="status-icon"></span><span id="statusText">更新失败！</span>`;
                        // 同时将版权信息中的“灿然科技@2026 版权所有”已存在，无需额外操作
                    }
                }, 1000);

                // 但为了体验，在显示“正在更新”之后，如果用户想跳过等待可以点击？无需，按需求30秒后显示失败。
                // 注意：如果30秒内任何点击？不处理，保持。
            }, 3800); // 等待动画完成

            // 另外，如果用户提前点击登录等，我们不能让启动页挡住，但需求是固定流程，所以保留。
            // 默认启动页可见，直到更新失败后，可以加一个“继续”按钮？但需求未要求，我们保留启动页，方便查看。
            // 但为了演示后续，我们可以在更新失败后，允许点击进入登录？ 但需求只是说“在动画过后一直显示正在更新，30秒后显示更新失败！”
            // 所以我们保留启动页，不自动跳转。 但为了展示后面的系统，提供一个隐藏的点击? 但未要求，我们照做。
            // 不过为了用户能进入系统，我们可以在失败后点击启动页进入登录（非必须，但体验好）
            // 加一个小特性：点击启动页任意位置进入登录（仅在失败后）
            splash.addEventListener('click', function enterOnFail(e) {
                // 检查是否已经失败
                if (statusEl.classList.contains('fail')) {
                    // 隐藏启动页，显示登录页
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        document.getElementById('auth-screen').style.display = 'flex';
                    }, 300);
                }
            });

            // 但也要确保动画期间不能跳过，但没什么影响。
        })();

        // ==========================================
        // 2. 登录/注册 切换 + 模拟登录
        // ==========================================
        const authScreen = document.getElementById('auth-screen');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const tabs = document.querySelectorAll('.auth-tab');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const loginTip = document.getElementById('login-tip');
        const registerTip = document.getElementById('register-tip');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                if (this.dataset.tab === 'login') {
                    loginForm.style.display = 'block';
                    registerForm.style.display = 'none';
                    loginTip.style.display = 'none';
                } else {
                    loginForm.style.display = 'none';
                    registerForm.style.display = 'block';
                    registerTip.style.display = 'none';
                }
            });
        });

        loginBtn.addEventListener('click', function() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (username === 'admin' && password === '123456') {
                loginTip.style.display = 'none';
                // 隐藏登录页，显示主系统
                authScreen.style.display = 'none';
                document.getElementById('main-system').style.display = 'block';
            } else {
                loginTip.style.display = 'block';
                loginTip.textContent = '用户名或密码错误 (默认 admin/123456)';
            }
        });

        registerBtn.addEventListener('click', function() {
            const u = document.getElementById('reg-username').value.trim();
            const p = document.getElementById('reg-password').value.trim();
            const c = document.getElementById('reg-confirm').value.trim();
            if (!u || !p || !c || p !== c) {
                registerTip.style.display = 'block';
                registerTip.textContent = '注册信息有误，请检查';
                return;
            }
            registerTip.style.display = 'block';
            registerTip.style.color = '#27ae60';
            registerTip.textContent = '注册成功！请切换登录';
            // 简单填充
            document.getElementById('login-username').value = u;
            document.getElementById('login-password').value = p;
            // 切到登录
            tabs.forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="login"]').classList.add('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            registerTip.style.display = 'none';
            loginTip.style.display = 'none';
        });

        // ==========================================
        // 3. 侧边栏菜单折叠
        // ==========================================
        document.querySelectorAll('.menu-title').forEach(title => {
            title.addEventListener('click', function(e) {
                const sub = this.nextElementSibling;
                if (sub && sub.classList.contains('submenu')) {
                    sub.classList.toggle('open');
                    this.classList.toggle('expanded');
                }
            });
        });

        // 子菜单激活效果
        document.querySelectorAll('.submenu-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.submenu-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                // 更新页面标题
                const title = document.querySelector('.page-title');
                if (title) title.textContent = '📋 ' + this.textContent;
            });
        });

        // 额外：启动页如果30秒后失败，点击可进入登录，已经在splashSequence中处理
        // 但为了启动页不遮挡，若用户提前点击? 我们只在失败后允许进入。
        // 同时如果用户没有点击，一直停留在启动页，符合“一直显示正在更新，30秒后显示更新失败！”
        // 版权信息已在底部显示
        console.log('gorenje 系统启动，版权 灿然科技@2026');
    </script>
</body>
</html>
