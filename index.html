<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gorenje 出入库管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* ========== 启动页 ========== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .splash-logo {
            font-size: 72px;
            font-weight: 300;
            color: #fff;
            letter-spacing: 15px;
            opacity: 0;
            transform: translateY(30px);
            animation: logoFadeIn 2s ease forwards;
        }
        .splash-line {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e94560, transparent);
            margin-top: 20px;
            animation: lineExpand 1.5s ease 0.8s forwards;
        }
        .splash-copyright {
            position: absolute;
            bottom: 30px;
            color: #666;
            font-size: 12px;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }
        @keyframes logoFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes lineExpand {
            0% {
                width: 0;
            }
            100% {
                width: 300px;
            }
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* ========== 登录注册页 ========== */
        #auth-screen {
            display: none;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-title {
            color: #fff;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: #e94560;
            border-bottom-color: #e94560;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus {
            border-color: #e94560;
        }
        .form-group input::placeholder {
            color: #555;
        }
        .remember-box {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .remember-box input {
            margin-right: 8px;
        }
        .remember-box label {
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .auth-btn:hover {
            background: #d63850;
        }
        .auth-tip {
            color: #e94560;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        /* ========== 主系统 ========== */
        #main-system {
            display: none;
            width: 100%;
            height: 100vh;
        }
        .sidebar {
            width: 220px;
            height: 100%;
            background: #1a1a2e;
            float: left;
            overflow-y: auto;
            padding: 20px 0;
        }
        .sidebar-logo {
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 5px;
            padding: 10px 0 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }
        .menu-group {
            margin-bottom: 5px;
        }
        .menu-title {
            padding: 14px 20px;
            color: #ccc;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            transition: all 0.2s;
        }
        .menu-title:hover {
            background: rgba(233, 69, 96, 0.1);
            color: #fff;
        }
        .menu-title.active {
            background: rgba(233, 69, 96, 0.15);
            color: #e94560;
        }
        .menu-arrow {
            transition: transform 0.3s;
            font-size: 12px;
        }
        .menu-title.expanded .menu-arrow {
            transform: rotate(180deg);
        }
        .submenu {
            display: none;
            background: rgba(0, 0, 0, 0.2);
        }
        .submenu.open {
            display: block;
        }
        .submenu-item {
            padding: 12px 20px 12px 40px;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .submenu-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        .submenu-item.active {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
            border-left: 3px solid #e94560;
        }

        .main-content {
            margin-left: 220px;
            height: 100%;
            background: #f5f6fa;
            overflow-y: auto;
        }
        .content-header {
            background: #fff;
            padding: 18px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        .btn-primary:hover {
            background: #d63850;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        .btn-success:hover {
            background: #219a52;
        }
        .btn-default {
            background: #fff;
            color: #555;
            border: 1px solid #ddd;
        }
        .btn-default:hover {
            border-color: #e94560;
            color: #e94560;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        .content-body {
            padding: 20px 25px;
        }
        .toolbar {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar input,
        .toolbar select {
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .toolbar input:focus,
        .toolbar select:focus {
            border-color: #e94560;
        }

        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 6px;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th {
            background: #f8f9fa;
            padding: 12px 10px;
            text-align: left;
            font-weight: 500;
            color: #555;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        .data-table tr:hover {
            background: #fafafa;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* 弹窗 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-mask.show {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 8px;
            width: 900px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 2;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 500;
        }
        .modal-close {
            cursor: pointer;
            color: #999;
            font-size: 20px;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            text-align: right;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            position: sticky;
            bottom: 0;
            background: #fff;
            z-index: 2;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .form-grid .form-item {
            display: flex;
            flex-direction: column;
        }
        .form-item label {
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
        }
        .form-item input,
        .form-item select,
        .form-item textarea {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            border-color: #e94560;
        }
        .form-item.full {
            grid-column: span 3;
        }

        .sub-fieldset {
            border: 1px dashed #ddd;
            border-radius: 4px;
            padding: 10px 15px;
            margin-top: 5px;
        }
        .sub-fieldset legend {
            font-size: 12px;
            color: #888;
            padding: 0 5px;
        }

        .action-btn {
            padding: 4px 8px;
            font-size: 12px;
            margin-right: 5px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 3px;
            cursor: pointer;
        }
        .action-btn.edit {
            color: #e94560;
            border-color: #e94560;
        }
        .action-btn.delete {
            color: #e74c3c;
            border-color: #e74c3c;
        }

        /* 导出配置弹窗样式 */
        .export-field-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px 0;
        }
        .export-field-grid label {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            padding: 3px 0;
        }
        .export-field-grid label input[type="checkbox"] {
            margin-right: 6px;
            accent-color: #e94560;
        }
        .export-options {
            margin: 15px 0 10px;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        .export-options label {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #444;
            cursor: pointer;
        }
        .export-options label input[type="checkbox"] {
            margin-right: 6px;
            accent-color: #e94560;
        }
        .select-all-link {
            color: #e94560;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
            text-decoration: underline;
        }
        .select-all-link:hover {
            color: #c0392b;
        }
        .field-count {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
        }

        /* 历史订单列表样式 */
        .history-order-list {
            margin-top: 6px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            max-height: 180px;
            overflow-y: auto;
            background: #fff;
            display: none;
        }
        .history-order-list .history-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            transition: background 0.15s;
        }
        .history-order-list .history-item:hover {
            background: #f0f0f0;
        }
        .history-order-list .history-item:last-child {
            border-bottom: none;
        }
        .history-order-list .history-item .h-label {
            color: #999;
            font-size: 12px;
            margin-right: 6px;
        }
        .history-order-list .history-empty {
            padding: 12px;
            color: #999;
            font-size: 13px;
            text-align: center;
        }

        /* 导出筛选行 */
        .export-filter-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .export-filter-row label {
            font-size: 13px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .export-filter-row input {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            width: 180px;
        }
        .export-filter-row input:focus {
            border-color: #e94560;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .sidebar-logo {
                font-size: 14px;
                letter-spacing: 2px;
            }
            .menu-title {
                font-size: 12px;
                padding: 10px 12px;
            }
            .submenu-item {
                font-size: 12px;
                padding: 10px 12px 10px 20px;
            }
            .main-content {
                margin-left: 60px;
            }
            .export-field-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-item.full {
                grid-column: 1;
            }
            .modal {
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <!-- 启动页 -->
    <div id="splash-screen">
        <div class="splash-logo">gorenje</div>
        <div class="splash-line"></div>
        <div class="splash-copyright">灿然科技@2026 版权所有</div>
    </div>

    <!-- 登录注册页 -->
    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-title">出入库管理系统</div>
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>

            <div id="login-form">
                <div class="form-group">
                    <label>账号（全英文）</label>
                    <input type="text" id="login-username" placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <label>密码（数字+小写字母）</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                <div class="remember-box">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">记住密码</label>
                </div>
                <div class="auth-tip" id="login-tip"></div>
                <button class="auth-btn" onclick="doLogin()">登 录</button>
            </div>

            <div id="register-form" style="display:none;">
                <div class="form-group">
                    <label>账号（全英文）</label>
                    <input type="text" id="reg-username" placeholder="只能输入英文字母">
                </div>
                <div class="form-group">
                    <label>密码（数字+小写字母）</label>
                    <input type="password" id="reg-password" placeholder="至少6位，数字+小写字母组合">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="reg-password2" placeholder="再次输入密码">
                </div>
                <div class="auth-tip" id="reg-tip"></div>
                <button class="auth-btn" onclick="doRegister()">注 册</button>
            </div>
        </div>
    </div>

    <!-- 主系统 -->
    <div id="main-system">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-logo">gorenje</div>

            <div class="menu-group">
                <div class="menu-title" onclick="toggleMenu(this)">
                    <span>一、入库管理</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu">
                    <div class="submenu-item" onclick="showPage('purchase-in')">1、采购入库</div>
                    <div class="submenu-item" onclick="showPage('purchase-exchange')">2、采购换货</div>
                    <div class="submenu-item" onclick="showPage('purchase-return')">3、采购退货</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-title" onclick="toggleMenu(this)">
                    <span>二、零售管理</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu">
                    <div class="submenu-item" onclick="showPage('retail-order')">1、零售订单</div>
                    <div class="submenu-item" onclick="showPage('retail-sell')">2、零售开单</div>
                    <div class="submenu-item" onclick="showPage('retail-exchange')">3、零售换货</div>
                    <div class="submenu-item" onclick="showPage('retail-return')">4、零售退货</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-title" onclick="toggleMenu(this)">
                    <span>三、库存管理</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu">
                    <div class="submenu-item" onclick="showPage('stock-daily')">库存日报</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-title" onclick="toggleMenu(this)">
                    <span>四、样机管理</span>
                    <span class="menu-arrow">▼</span>
                </div>
                <div class="submenu">
                    <div class="submenu-item" onclick="showPage('sample-display')">1、门店上样</div>
                    <div class="submenu-item" onclick="showPage('sample-sell')">2、样机销售</div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content" id="content-area">
            <!-- 动态内容渲染区 -->
        </div>
    </div>

    <!-- 通用弹窗 -->
    <div class="modal-mask" id="modal-mask">
        <div class="modal" id="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">标题</span>
                <span class="modal-close" onclick="closeModal()">×</span>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <script>
        // ===================================================================
        // 1. IndexedDB 封装 —— 用于替代 localStorage，容量更大，支持复杂数据
        // ===================================================================
        const DB_NAME = 'gorenjeDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'appData';
        const DATA_KEY = 'mainData';

        // 默认数据结构（和原来 localStorage 存储的结构一致）
        function getDefaultData() {
            return {
                users: {},
                currentUser: null,
                purchaseIn: [],
                purchaseExchange: [],
                purchaseReturn: [],
                retailOrder: [],
                retailSell: [],
                retailExchange: [],
                retailReturn: [],
                sampleDisplay: [],
                sampleSell: [],
                stock: []
            };
        }

        // 打开数据库，如果不存在则创建
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        // 保存数据到 IndexedDB
        async function saveData(data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put({ id: DATA_KEY, ...data });
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // 从 IndexedDB 加载数据
        async function loadData() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(DATA_KEY);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    if (request.result) {
                        const { id, ...data } = request.result;
                        resolve(data);
                    } else {
                        resolve(null);
                    }
                };
                tx.onerror = () => reject(tx.error);
            });
        }

        // 迁移 localStorage 数据到 IndexedDB（如果有）
        async function migrateFromLocalStorage() {
            try {
                const raw = localStorage.getItem('gorenje_inventory_data');
                if (raw) {
                    const oldData = JSON.parse(raw);
                    const existing = await loadData();
                    if (!existing || Object.keys(existing).length === 0) {
                        await saveData(oldData);
                        console.log('数据已从 localStorage 迁移到 IndexedDB');
                    }
                }
            } catch (e) {
                console.warn('迁移 localStorage 数据失败:', e);
            }
        }

        // 全局数据对象
        let appData = getDefaultData();

        // 初始化数据
        async function initData() {
            try {
                let data = await loadData();
                if (data && Object.keys(data).length > 0) {
                    appData = data;
                } else {
                    await migrateFromLocalStorage();
                    data = await loadData();
                    if (data && Object.keys(data).length > 0) {
                        appData = data;
                    } else {
                        appData = getDefaultData();
                        await saveData(appData);
                    }
                }
            } catch (e) {
                console.error('加载数据失败，使用默认数据:', e);
                appData = getDefaultData();
                await saveData(appData);
            }
            return appData;
        }

        // 保存数据

            await saveData(appData);
        }

        function validateUsername(name) {
            return /^[a-zA-Z]+$/.test(name);
        }

        function validatePassword(pwd) {
            return /^(?=.*[a-z])(?=.*\d)[a-z\d]{6,}$/.test(pwd);
        }

        async function doRegister() {
            const name = document.getElementById('reg-username').value.trim();
            const pwd = document.getElementById('reg-password').value;
            const pwd2 = document.getElementById('reg-password2').value;
            const tip = document.getElementById('reg-tip');

            if (!name) { tip.textContent = '请输入账号';
                tip.style.display = 'block'; return; }
            if (!validateUsername(name)) { tip.textContent = '账号必须为全英文字母';
                tip.style.display = 'block'; return; }
            if (!validatePassword(pwd)) { tip.textContent = '密码需6位以上，数字+小写字母组合';
                tip.style.display = 'block'; return; }
            if (pwd !== pwd2) { tip.textContent = '两次密码不一致';
                tip.style.display = 'block'; return; }
            if (appData.users[name]) { tip.textContent = '账号已存在';
                tip.style.display = 'block'; return; }

            appData.users[name] = { password: pwd };
            await saveAppData();
            tip.style.color = '#27ae60';
            tip.textContent = '注册成功，请登录';
            tip.style.display = 'block';
            setTimeout(() => {
                document.querySelector('[data-tab="login"]').click();
                document.getElementById('login-username').value = name;
            }, 1000);
        }

        async function doLogin() {
            const name = document.getElementById('login-username').value.trim();
            const pwd = document.getElementById('login-password').value;
            const remember = document.getElementById('remember-me').checked;
            const tip = document.getElementById('login-tip');

            if (!name || !pwd) { tip.textContent = '请输入账号和密码';
                tip.style.display = 'block'; return; }

            const user = appData.users[name];
            if (!user || user.password !== pwd) {
                tip.textContent = '账号或密码错误';
                tip.style.display = 'block';
                return;
            }

            appData.currentUser = name;
            await saveAppData();

            if (remember) {
                sessionStorage.setItem('gorenje_remember', '1');
                localStorage.setItem('gorenje_last_user', name);
            } else {
                sessionStorage.setItem('gorenje_remember', '0');
            }

            enterSystem();
        }

        function checkRememberedLogin() {
            const remembered = sessionStorage.getItem('gorenje_remember');
            const lastUser = localStorage.getItem('gorenje_last_user');
            if (remembered === '1' && lastUser && appData.users[lastUser]) {
                appData.currentUser = lastUser;

        // ==================== 渲染表格 ====================
        function renderTable(dataType) {
            const table = document.getElementById('data-table');
            const cols = tableColumns[dataType];
            let data = appData[dataType] || [];

            const keyword = document.getElementById('search-input')?.value || '';
            if (keyword) {
                data = data.filter(row =>
                    Object.values(row).some(v => String(v).includes(keyword))
                );
            }

            const whFilter = document.getElementById('warehouse-filter');
            if (whFilter && whFilter.value && data[0]?.warehouse !== undefined) {
                data = data.filter(row => row.warehouse === whFilter.value);
            }

            let html = '<thead><tr>';
            cols.forEach(c => html += `<th>${c.label}</th>`);
            html += '<th style="width:100px">操作</th></tr></thead><tbody>';

            if (data.length === 0) {
                html += `<tr><td colspan="${cols.length + 1}" class="empty-tip">暂无数据，请新增或导入</td></tr>`;
            } else {
                data.forEach((row, idx) => {
                    html += '<tr>';
                    cols.forEach(c => {
                        html += `<td>${row[c.key] !== undefined && row[c.key] !== null ? row[c.key] : ''}</td>`;
                    });
                    html += `<td>
                        <button class="action-btn edit" onclick="editRow('${dataType}', ${idx})">编辑</button>
                        <button class="action-btn delete" onclick="deleteRow('${dataType}', ${idx})">删除</button>
                    </td>`;
                    html += '</tr>';
                });
            }
            html += '</tbody>';
            table.innerHTML = html;
        }

        // ==================== 新增/编辑弹窗 ====================
        function openAddForm(dataType) {
            const isRetail = dataType.includes('retail') || dataType === 'sampleSell';
            const isPurchase = dataType.includes('purchase');
            const isSample = dataType === 'sampleDisplay';

            let formHtml = '';

            if (isPurchase || dataType === 'purchaseExchange' || dataType === 'purchaseReturn') {
                formHtml = buildPurchaseForm(dataType);
            } else if (isRetail || dataType === 'sampleSell') {
                formHtml = buildRetailForm(dataType);
            } else if (isSample) {
                formHtml = buildSampleDisplayForm();
            } else if (dataType === 'stock') {
                formHtml = buildStockForm();

            document.getElementById('modal-title').textContent = '新增记录';
            document.getElementById('modal-body').innerHTML = formHtml;
            document.getElementById('modal-footer').innerHTML = `
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRow('${dataType}')">保存</button>

                purchaseIn: 'RK-',
                purchaseExchange: 'HH-',
                purchaseReturn: 'TH-',
                retailOrder: 'DD-',
                retailSell: 'KD-',
                retailExchange: 'ZH-',
                retailReturn: 'TT-',
                sampleDisplay: 'SY-',
                sampleSell: 'YX-'
            };
            if (prefixMap[dataType]) {
                document.getElementById('f_orderNo').value = genOrderNo(prefixMap[dataType], dataType);
            }

            bindAutoCalc();

            // ---- 为零售表单绑定手机号自动带出 ----

                const el = document.getElementById('f_' + key);
                if (el) el.value = row[key];
            });
            document.getElementById('modal-title').textContent = '编辑记录';
            document.getElementById('modal-footer').innerHTML = `
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="updateRow('${dataType}', ${idx})">更新</button>
            `;

            const isRetail = dataType.includes('retail') || dataType === 'sampleSell';
            if (isRetail) {
                const phoneEl = document.getElementById('f_phone');
                if (phoneEl) {
                    phoneEl.removeEventListener('blur', function() {});
                    phoneEl.addEventListener('blur', function() {
                        autoFillByPhone(dataType);
                    });
                }
            }
        }

        async function saveRow(dataType) {
            const row = collectFormData();

            if (row.quantity && row.price) row.amount = (row.quantity * row.price).toFixed(2);
            if (row.sellPrice && row.retailPrice) row.discount = (row.sellPrice / row.retailPrice).toFixed(2);
            if (row.sellPrice && row.costPrice) row.profit = (row.sellPrice - row.costPrice).toFixed(2);
            if (row.payAmount && row.sellPrice) row.hasBalance = row.payAmount < row.sellPrice ? '是' : '否';

            if (!appData[dataType]) appData[dataType] = [];
            appData[dataType].push(row);
            await saveAppData();
            closeModal();
            renderTable(dataType);
            await updateStock();
        }

        async function updateRow(dataType, idx) {
            const row = collectFormData();
            if (row.quantity && row.price) row.amount = (row.quantity * row.price).toFixed(2);
            if (row.sellPrice && row.retailPrice) row.discount = (row.sellPrice / row.retailPrice).toFixed(2);
            if (row.sellPrice && row.costPrice) row.profit = (row.sellPrice - row.costPrice).toFixed(2);
            if (row.payAmount && row.sellPrice) row.hasBalance = row.payAmount < row.sellPrice ? '是' : '否';

            appData[dataType][idx] = row;
            await saveAppData();
            closeModal();
            renderTable(dataType);
            await updateStock();
        }

        async function deleteRow(dataType, idx) {
            if (!confirm('确定删除此条记录？')) return;
            appData[dataType].splice(idx, 1);
            await saveAppData();
            renderTable(dataType);
            await updateStock();
        }

        function collectFormData() {
            const data = {};
            document.querySelectorAll('#modal-body input, #modal-body select, #modal-body textarea').forEach(el => {
                if (el.id.startsWith('f_')) {
                    const key = el.id.substring(2);
                    data[key] = el.value;
                }
            });
            return data;
        }

        function bindAutoCalc() {
            const qty = document.getElementById('f_quantity');
            const price = document.getElementById('f_price');
            const amount = document.getElementById('f_amount');
            if (qty && price && amount) {
                const calc = () => {
                    if (qty.value && price.value) amount.value = (qty.value * price.value).toFixed(2);
                };
                qty.addEventListener('input', calc);
                price.addEventListener('input', calc);
            }

            const sp = document.getElementById('f_sellPrice');
            const rp = document.getElementById('f_retailPrice');
            const disc = document.getElementById('f_discount');
            if (sp && rp && disc) {
                const calc = () => {
                    if (sp.value && rp.value && rp.value > 0) disc.value = (sp.value / rp.value).toFixed(2);
                };
                sp.addEventListener('input', calc);
                rp.addEventListener('input', calc);
            }

            const cp = document.getElementById('f_costPrice');
            const profit = document.getElementById('f_profit');
            if (sp && cp && profit) {
                const calc = () => {
                    if (sp.value && cp.value) profit.value = (sp.value - cp.value).toFixed(2);
                };
                sp.addEventListener('input', calc);
                cp.addEventListener('input', calc);
            }
        }

            document.getElementById('modal-mask').classList.remove('show');

        // ===================================================================
        // 5. 手机号自动带出历史订单（功能1）
        // ===================================================================
        function autoFillByPhone(dataType) {
            const phoneEl = document.getElementById('f_phone');
            if (!phoneEl) return;
            const phone = phoneEl.value.trim();
            const listEl = document.getElementById('history-order-list');
            if (!listEl) return;

            if (!phone) {
                listEl.style.display = 'none';
                return;
            }

            // 从所有零售相关数据中查找
            const retailTypes = ['retailOrder', 'retailSell', 'retailExchange', 'retailReturn'];
            let historyOrders = [];
            retailTypes.forEach(type => {
                const items = appData[type] || [];
                items.forEach(item => {
                    if (item.phone && item.phone.trim() === phone) {
                        historyOrders.push({
                            type: type,
                            ...item
                        });
                    }
                });
            });

            if (historyOrders.length === 0) {
                listEl.innerHTML = `<div class="history-empty">未找到该手机号的历史订单</div>`;
                listEl.style.display = 'block';
                return;
            }

            // 去重（按订单号去重，避免同一个订单被多次添加）
            const seen = new Set();
            const unique = historyOrders.filter(item => {
                const key = item.orderNo || item.customer + item.address;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            let html = '';
            unique.forEach((item, idx) => {
                const label = `${item.orderNo || '无单号'} | ${item.customer || '无姓名'} | ${item.address || '无地址'}`;
                html += `<div class="history-item" data-idx="${idx}">
                    <span class="h-label">📋</span> ${label}
                </div>`;
            });
            listEl.innerHTML = html;
            listEl.style.display = 'block';

            // 绑定点击事件
            listEl.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.idx);
                    const selected = unique[idx];
                    if (selected) {
                        // 填充客户姓名和安装地址
                        const customerEl = document.getElementById('f_customer');
                        const addressEl = document.getElementById('f_address');
                        if (customerEl) customerEl.value = selected.customer || '';
                        if (addressEl) addressEl.value = selected.address || '';
                        // 可选：填充销售人员、销售渠道（但用户说只带出订单信息，这里只填姓名和地址）
                        // 也可以填充品牌，但用户没要求，保持简洁
                        listEl.style.display = 'none';
                    }
                });
            });
        }

        // ===================================================================
        // 6. 库存自动更新
        // ===================================================================
        async function updateStock() {
            const stockMap = {};

            (appData.purchaseIn || []).forEach(item => {
                const key = `${item.brand}_${item.goodsName}_${item.model}_${item.warehouse}`;
                if (!stockMap[key]) {
                    stockMap[key] = { brand: item.brand, goodsName: item.goodsName, model: item.model,
                        warehouse: item.warehouse, bookStock: 0, salesOrder: 0 };
                }
                stockMap[key].bookStock += Number(item.quantity) || 0;
            });

            (appData.purchaseReturn || []).forEach(item => {
                const key = `${item.brand}_${item.goodsName}_${item.model}_${item.warehouse}`;
                if (!stockMap[key]) {
                    stockMap[key] = { brand: item.brand, goodsName: item.goodsName, model: item.model,
                        warehouse: item.warehouse, bookStock: 0, salesOrder: 0 };
                }
                stockMap[key].bookStock -= Number(item.quantity) || 0;
            });

            (appData.retailSell || []).forEach(item => {
                const key = `_${item.goodsName}_${item.model}_新库房`;
                if (!stockMap[key]) {
                    stockMap[key] = { brand: '', goodsName: item.goodsName, model: item.model, warehouse: '新库房',
                        bookStock: 0, salesOrder: 0 };
                }
                stockMap[key].bookStock -= 1;
            });

            (appData.retailReturn || []).forEach(item => {
                const key = `_${item.goodsName}_${item.model}_新库房`;
                if (!stockMap[key]) {
                    stockMap[key] = { brand: '', goodsName: item.goodsName, model: item.model, warehouse: '新库房',
                        bookStock: 0, salesOrder: 0 };
                }
                stockMap[key].bookStock += 1;
            });

            (appData.retailOrder || []).forEach(item => {
                const key = `_${item.goodsName}_${item.model}_新库房`;
                if (!stockMap[key]) {
                    stockMap[key] = { brand: '', goodsName: item.goodsName, model: item.model, warehouse: '新库房',
                        bookStock: 0, salesOrder: 0 };
                }
                stockMap[key].salesOrder += 1;
            });

            (appData.sampleDisplay || []).forEach(item => {
                const key = `${item.brand}_${item.goodsName}_${item.model}_新库房`;
                if (!stockMap[key]) {
                    stockMap[key] = { brand: item.brand, goodsName: item.goodsName, model: item.model,
                        warehouse: '新库房', bookStock: 0, salesOrder: 0 };
                }
                stockMap[key].bookStock -= Number(item.quantity) || 0;
            });

            appData.stock = Object.values(stockMap).map(s => ({
                ...s,
                availableStock: s.bookStock - s.salesOrder
            }));

            await saveAppData();
        }

        async function handleFileImport(dataType) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);

                const colMap = {};
                tableColumns[dataType].forEach(c => colMap[c.label] = c.key);

                let imported = 0;
                json.forEach(row => {
                    const mapped = {};
                    Object.keys(row).forEach(k => {
                        if (colMap[k]) mapped[colMap[k]] = row[k];
                    });

                    if (!mapped.orderNo) {
                        const prefixMap = {
                            purchaseIn: 'RK-',
                            purchaseExchange: 'HH-',
                            purchaseReturn: 'TH-',
                            retailOrder: 'DD-',
                            retailSell: 'KD-',
                            retailExchange: 'ZH-',
                            retailReturn: 'TT-',
                            sampleDisplay: 'SY-',
                            sampleSell: 'YX-'
                        };
                        mapped.orderNo = genOrderNo(prefixMap[dataType] || 'IM-', dataType);
                    }

                    if (mapped.quantity && mapped.price) mapped.amount = (mapped.quantity * mapped.price).toFixed(2);
                    if (mapped.sellPrice && mapped.retailPrice) mapped.discount = (mapped.sellPrice / mapped.retailPrice)
                        .toFixed(2);
                    if (mapped.sellPrice && mapped.costPrice) mapped.profit = (mapped.sellPrice - mapped.costPrice).toFixed(
                    2);

                    if (!appData[dataType]) appData[dataType] = [];
                    appData[dataType].push(mapped);
                    imported++;
                });

                await saveAppData();
                await updateStock();
                renderTable(dataType);
                alert(`成功导入 ${imported} 条记录`);
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        function generateExcel(dataType) {
            const cols = tableColumns[dataType];
            let data = appData[dataType] || [];

            // ---- 客户筛选（仅零售相关） ----
            const isRetail = dataType.includes('retail') || dataType === 'sampleSell';
            const filterInput = document.getElementById('export-filter-customer');
            let filterKeyword = '';
            if (filterInput) {
                filterKeyword = filterInput.value.trim().toLowerCase();
            }
            if (isRetail && filterKeyword) {
                data = data.filter(row => {
                    const name = (row.customer || '').toLowerCase();
                    const phone = (row.phone || '').toLowerCase();
                    return name.includes(filterKeyword) || phone.includes(filterKeyword);
                });
            }

            const selectedKeys = [];
            document.querySelectorAll('.export-field-cb:checked').forEach(cb => {
                selectedKeys.push(cb.value);
            });

            if (selectedKeys.length === 0) {
                alert('请至少选择一个字段');
                return;
            }

            const showSummary = document.getElementById('export-summary')?.checked || false;
            const groupByWarehouse = document.getElementById('export-filter-warehouse')?.checked || false;
            const groupByCustomer = document.getElementById('export-group-by-customer')?.checked || false;

            const selectedCols = cols.filter(c => selectedKeys.includes(c.key));

            const numericKeys = ['quantity', 'price', 'amount', 'invoiceAmount', 'sellPrice', 'retailPrice',
                'payAmount', 'costPrice', 'profit', 'bookStock', 'salesOrder', 'availableStock'
            ];
            const numericCols = selectedCols.filter(c => numericKeys.includes(c.key));

            let exportRows = [];

            // ---- 按客户分组汇总（零售专用） ----
            if (isRetail && groupByCustomer && data.length > 0) {
                // 按客户分组（使用 phone 作为主键，如果没有 phone 则用 customer）
                const groups = {};
                data.forEach(row => {
                    const key = row.phone || row.customer || '未指定客户';
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(row);
                });

                const sortedKeys = Object.keys(groups).sort();
                sortedKeys.forEach(customerKey => {
                    const rows = groups[customerKey];
                    // 显示客户信息行
                    const titleRow = {};
                    selectedCols.forEach(c => {
                        if (c.key === 'customer') {
                            titleRow[c.key] = `【${customerKey}】`;
                        } else if (c.key === 'phone') {
                            titleRow[c.key] = `电话: ${customerKey}`;
                        } else {
                            titleRow[c.key] = '';
                        }
                    });
                    exportRows.push(titleRow);

                    // 订单明细
                    rows.forEach(row => {
                        const rowData = {};
                        selectedCols.forEach(c => {
                            rowData[c.key] = row[c.key] !== undefined && row[c.key] !== null ?
                                row[c.key] : '';
                        });
                        exportRows.push(rowData);
                    });

                    // 客户小计
                    const subRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            rows.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            subRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'customer') {
                            subRow[c.key] = `小计 (${customerKey})`;
                        } else if (c.key === 'phone') {
                            subRow[c.key] = '';
                        } else {
                            subRow[c.key] = '';
                        }
                    });
                    exportRows.push(subRow);

                    // 空行分隔
                    const emptyRow = {};
                    selectedCols.forEach(c => { emptyRow[c.key] = ''; });
                    exportRows.push(emptyRow);
                });

                // 总计（所有客户汇总）
                if (showSummary) {
                    const totalRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            data.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            totalRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'customer') {
                            totalRow[c.key] = '总计（所有客户）';
                        } else if (c.key === 'phone') {
                            totalRow[c.key] = '';
                        } else {
                            totalRow[c.key] = '';
                        }
                    });
                    exportRows.push(totalRow);
                }
            }
            // ---- 按仓库分组（采购/库存） ----
            else if (groupByWarehouse && (dataType.includes('purchase') || dataType === 'stock')) {
                const groups = {};
                data.forEach(row => {
                    const wh = row.warehouse || '未指定';
                    if (!groups[wh]) groups[wh] = [];
                    groups[wh].push(row);
                });

                Object.keys(groups).forEach(wh => {
                    const rows = groups[wh];
                    const titleRow = {};
                    selectedCols.forEach(c => {
                        titleRow[c.key] = c.key === 'warehouse' ? `【${wh}】` : '';
                    });
                    exportRows.push(titleRow);

                    rows.forEach(row => {
                        const rowData = {};
                        selectedCols.forEach(c => {
                            rowData[c.key] = row[c.key] !== undefined && row[c.key] !== null ?
                                row[c.key] : '';
                        });
                        exportRows.push(rowData);
                    });

                    const subRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            rows.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            subRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'warehouse') {
                            subRow[c.key] = `小计 (${wh})`;
                        } else {
                            subRow[c.key] = '';
                        }
                    });
                    exportRows.push(subRow);

                    const emptyRow = {};
                    selectedCols.forEach(c => { emptyRow[c.key] = ''; });
                    exportRows.push(emptyRow);
                });

                if (showSummary) {
                    const totalRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            data.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            totalRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'warehouse') {
                            totalRow[c.key] = '总计';
                        } else {
                            totalRow[c.key] = '';
                        }
                    });
                    exportRows.push(totalRow);
                }
            }
            // ---- 普通导出 ----
            else {
                data.forEach(row => {
                    const rowData = {};
                    selectedCols.forEach(c => {
                        rowData[c.key] = row[c.key] !== undefined && row[c.key] !== null ? row[c.key] :
                            '';
                    });
                    exportRows.push(rowData);
                });

                if (showSummary && exportRows.length > 0) {
                    const totalRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            data.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            totalRow[c.key] = sum.toFixed(2);
                        } else {
                            totalRow[c.key] = '';
                        }
                    });
                    if (selectedCols.length > 0) {
                        totalRow[selectedCols[0].key] = '汇总';
                    }
                    exportRows.push(totalRow);
                }
            }

            // 构建 Excel
            const excelData = [];
            const header = selectedCols.map(c => c.label);
            excelData.push(header);

            exportRows.forEach(row => {
                const rowArr = selectedCols.map(c => {
                    let val = row[c.key];
                    if (val === undefined || val === null) val = '';
                    if (typeof val === 'number' && !Number.isInteger(val)) {
                        val = Number(val).toFixed(2);
                    }
                    return val;
                });
                excelData.push(rowArr);
            });

            const ws = XLSX.utils.aoa_to_sheet(excelData);
            const colWidths = selectedCols.map(c => ({ wch: Math.max(c.label.length * 2, 12) }));
            ws['!cols'] = colWidths;

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '汇总表');

            const titleMap = {
                purchaseIn: '采购入库汇总表',
                purchaseExchange: '采购换货汇总表',
                purchaseReturn: '采购退货汇总表',
                retailOrder: '零售订单汇总表',
                retailSell: '零售开单汇总表',
                retailExchange: '零售换货汇总表',
                retailReturn: '零售退货汇总表',
                stock: '库存日报表',
                sampleDisplay: '门店上样汇总表',
                sampleSell: '样机销售汇总表'
            };

            const fileName = `${titleMap[dataType] || '导出数据'}.xlsx`;
            XLSX.writeFile(wb, fileName);
            closeModal();
        }

        // ===================================================================
        // 9. 页面就绪后更新库存
        // ===================================================================
        (function() {
            const checkAndUpdate = setInterval(async () => {
                if (dataReady) {
                    clearInterval(checkAndUpdate);
                    await updateStock();
                    if (currentPage === 'stock-daily') {
                        renderTable('stock');
                    }
                }
            }, 200);
        })();
    </script>
</body>
</html>
