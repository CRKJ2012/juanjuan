        async function updateStock() {
            const stockMap = {};

            function getStockKey(item) {
                return item.model || '无型号';
            }

            (appData.purchaseIn || []).forEach(item => {
                const key = getStockKey(item);
                if (!stockMap[key]) {
                    stockMap[key] = {
                        brand: item.brand || '',
                        goodsName: item.goodsName || '',
                        model: item.model || '',
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: 0
                    };
                }
                stockMap[key].bookStock += Number(item.quantity) || 0;
            });

            (appData.purchaseReturn || []).forEach(item => {
                const key = getStockKey(item);
                if (!stockMap[key]) {
                    stockMap[key] = {
                        brand: item.brand || '',
                        goodsName: item.goodsName || '',
                        model: item.model || '',
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: 0
                    };
                }
                stockMap[key].bookStock -= Number(item.quantity) || 0;
            });

            (appData.retailOrder || []).forEach(item => {
                const key = getStockKey(item);
                if (!stockMap[key]) {
                    stockMap[key] = {
                        brand: item.brand || '',
                        goodsName: item.goodsName || '',
                        model: item.model || '',
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: 0
                    };
                }
                stockMap[key].bookStock -= 1;
            });

            (appData.retailSell || []).forEach(item => {
                const key = getStockKey(item);
                if (!stockMap[key]) {
                    stockMap[key] = {
                        brand: item.brand || '',
                        goodsName: item.goodsName || '',
                        model: item.model || '',
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: 0
                    };
                }
                stockMap[key].bookStock -= 1;
            });

            (appData.retailReturn || []).forEach(item => {
                const key = getStockKey(item);
                if (!stockMap[key]) {
                    stockMap[key] = {
                        brand: item.brand || '',
                        goodsName: item.goodsName || '',
                        model: item.model || '',
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: 0
                    };
                }
                stockMap[key].bookStock -= 1;
            });

            (appData.sampleDisplay || []).forEach(item => {
                const key = getStockKey(item);
                if (!stockMap[key]) {
                    stockMap[key] = {
                        brand: item.brand || '',
                        goodsName: item.goodsName || '',
                        model: item.model || '',
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: 0
                    };
                }
                stockMap[key].bookStock -= Number(item.quantity) || 0;
            });

            const salesOrderMap = {};
            (appData.retailOrder || []).forEach(item => {
                const key = getStockKey(item);
                if (!salesOrderMap[key]) salesOrderMap[key] = 0;
                salesOrderMap[key] += 1;
            });
            Object.keys(salesOrderMap).forEach(key => {
                if (stockMap[key]) {
                    stockMap[key].salesOrder = salesOrderMap[key];
                } else {
                    let foundItem = null;
                    for (const order of (appData.retailOrder || [])) {
                        if (getStockKey(order) === key) {
                            foundItem = order;
                            break;
                        }
                    }
                    stockMap[key] = {
                        brand: foundItem ? foundItem.brand || '' : '',
                        goodsName: foundItem ? foundItem.goodsName || '' : '',
                        model: key === '无型号' ? '' : key,
                        warehouse: '全部',
                        bookStock: 0,
                        salesOrder: salesOrderMap[key]
                    };
                }
            });

            appData.stock = Object.values(stockMap).map(s => ({
                ...s,
                availableStock: s.bookStock - s.salesOrder
            }));

            await saveAppData();
        }

        function excelSerialToDate(serial) {
            if (typeof serial !== 'number' || serial < 0 || serial > 60000) return serial;
            let days = serial;
            if (serial >= 61) {
                days = serial - 1;
            }
            const epoch = new Date(1899, 11, 30);
            const date = new Date(epoch.getTime() + days * 86400000);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function handleFileImport(dataType) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);

                const colMap = {};
                tableColumns[dataType]?.forEach(c => colMap[c.label] = c.key);

                let dateFields = [];
                if (dataType === 'purchaseIn' || dataType === 'purchaseExchange' || dataType === 'purchaseReturn') {
                    dateFields = ['purchaseDate', 'receiveDate', 'invoiceDate'];
                } else if (dataType === 'retailOrder' || dataType === 'retailSell' || dataType === 'retailExchange' ||
                    dataType === 'retailReturn') {
                    dateFields = ['orderDate', 'installDate', 'salesRecordDate', 'invoiceDate', 'posDate'];
                } else if (dataType === 'sampleDisplay') {
                    dateFields = ['displayDate'];
                } else if (dataType === 'sampleSell') {
                    dateFields = ['orderDate', 'installDate', 'salesRecordDate', 'invoiceDate'];
                } else {
                    dateFields = [];
                }

                let imported = 0;
                json.forEach(row => {
                    const mapped = {};
                    Object.keys(row).forEach(k => {
                        if (colMap[k]) mapped[colMap[k]] = row[k];
                    });

                    dateFields.forEach(field => {
                        if (mapped[field] !== undefined && mapped[field] !== null && mapped[field] !==
                            '') {
                            const val = mapped[field];
                            if (typeof val === 'number') {
                                mapped[field] = excelSerialToDate(val);
                            }
                            if (typeof val === 'string' && /^\d+$/.test(val.trim())) {
                                const num = parseInt(val.trim());
                                if (num > 0 && num < 60000) {
                                    mapped[field] = excelSerialToDate(num);
                                }
                            }
                        }
                    });

                    if (!mapped.orderNo) {
                        const prefixMap = {
                            purchaseIn: 'RK-',
                            purchaseExchange: 'HH-',
                            purchaseReturn: 'TH-',
                            retailOrder: 'DD-',
                            retailSell: 'KD-',
                            retailExchange: 'ZH-',
                            retailReturn: 'TT-',
                            sampleDisplay: 'SY-',
                            sampleSell: 'YX-'
                        };
                        mapped.orderNo = genOrderNo(prefixMap[dataType] || 'IM-', dataType);
                    }

                    if (mapped.quantity && mapped.price) mapped.amount = (mapped.quantity * mapped.price).toFixed(2);
                    if (mapped.sellPrice && mapped.retailPrice) mapped.discount = (mapped.sellPrice / mapped
                        .retailPrice).toFixed(2);
                    if (mapped.sellPrice && mapped.costPrice) mapped.profit = (mapped.sellPrice - mapped.costPrice)
                        .toFixed(2);

                    if (!mapped.warehouse) mapped.warehouse = '新库房';

                    if (!appData[dataType]) appData[dataType] = [];
                    appData[dataType].push(mapped);
                    imported++;
                });

                await saveAppData();
                await updateStock();
                renderTable(dataType);
                alert(`成功导入 ${imported} 条记录`);
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        }

        function showExportConfig(dataType) {
            const cols = tableColumns[dataType];
            if (!cols) {
                alert('该模块暂无导出配置');
                return;
            }

            let fieldHtml = '';
            cols.forEach((c, idx) => {
                fieldHtml += `
                    <label>
                        <input type="checkbox" class="export-field-cb" data-key="${c.key}" value="${c.key}" checked>
                        ${c.label}
                    </label>
                `;
            });

            const isRetail = dataType.includes('retail') || dataType === 'sampleSell';

            const modalBody = `
                <div style="margin-bottom:10px;">
                    <span style="font-weight:500;font-size:14px;">选择要导出的字段：</span>
                    <span class="select-all-link" onclick="toggleExportFields(true)">全选</span>
                    <span class="select-all-link" onclick="toggleExportFields(false)">取消全选</span>
                    <span class="field-count">已选 <span id="selected-count">${cols.length}</span> 个字段</span>
                </div>
                <div class="export-field-grid" id="export-field-grid">
                    ${fieldHtml}
                </div>
                <div class="export-options">
                    <label>
                        <input type="checkbox" id="export-summary" checked>
                        显示汇总行（价格汇总）
                    </label>
                    ${isRetail ? `
                    <label>
                        <input type="checkbox" id="export-group-by-customer" checked>
                        按客户（户数）汇总金额
                    </label>
                    <label>
                        <input type="checkbox" id="export-customer-total" checked>
                        每位客户总金额（最后一列）
                    </label>
                    ` : ''}
                    <label>
                        <input type="checkbox" id="export-filter-warehouse" ${dataType.includes('purchase')||dataType==='stock'?'checked':''} ${dataType.includes('purchase')||dataType==='stock'?'':'disabled'}>
                        按仓库分组汇总
                    </label>
                    <label style="color:#999;font-size:12px;margin-left:auto;">
                        <span id="data-count">共 ${getFilteredData(dataType).length} 条数据</span>
                    </label>
                </div>
            `;

            document.getElementById('modal-title').textContent = '导出配置';
            document.getElementById('modal-body').innerHTML = modalBody;
            document.getElementById('modal-footer').innerHTML = `
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-success" onclick="generateExcel('${dataType}')">确认导出</button>
            `;
            document.getElementById('modal-mask').classList.add('show');

            document.querySelectorAll('.export-field-cb').forEach(cb => {
                cb.addEventListener('change', updateExportFieldCount);
            });
            updateExportFieldCount();

            if (!dataType.includes('purchase') && dataType !== 'stock') {
                const whOpt = document.getElementById('export-filter-warehouse');
                if (whOpt) whOpt.disabled = true;
            }
        }

        function updateExportFieldCount() {
            const checked = document.querySelectorAll('.export-field-cb:checked').length;
            const el = document.getElementById('selected-count');
            if (el) el.textContent = checked;
        }

        function toggleExportFields(selectAll) {
            document.querySelectorAll('.export-field-cb').forEach(cb => {
                cb.checked = selectAll;
            });
            updateExportFieldCount();
        }

        function generateExcel(dataType) {
            const cols = tableColumns[dataType];
            let data = getFilteredData(dataType);

            const selectedKeys = [];
            document.querySelectorAll('.export-field-cb:checked').forEach(cb => {
                selectedKeys.push(cb.value);
            });

            if (selectedKeys.length === 0) {
                alert('请至少选择一个字段');
                return;
            }

            const showSummary = document.getElementById('export-summary')?.checked || false;
            const groupByWarehouse = document.getElementById('export-filter-warehouse')?.checked || false;
            const groupByCustomer = document.getElementById('export-group-by-customer')?.checked || false;
            const showCustomerTotal = document.getElementById('export-customer-total')?.checked || false;

            const selectedCols = cols.filter(c => selectedKeys.includes(c.key));

            const numericKeys = ['quantity', 'price', 'amount', 'invoiceAmount', 'sellPrice', 'retailPrice',
                'payAmount', 'costPrice', 'profit', 'bookStock', 'salesOrder', 'availableStock', 'posAmount',
                'subsidyAmount'
            ];
            const numericCols = selectedCols.filter(c => numericKeys.includes(c.key));

            let exportRows = [];
            let customerTotalMap = {};

            const isRetail = dataType.includes('retail') || dataType === 'sampleSell';

            if (isRetail && groupByCustomer && data.length > 0) {
                const groups = {};
                data.forEach(row => {
                    const key = row.phone || row.customer || '未指定客户';
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(row);
                    const amt = parseFloat(row.payAmount) || 0;
                    if (!customerTotalMap[key]) customerTotalMap[key] = 0;
                    customerTotalMap[key] += amt;
                });

                const sortedKeys = Object.keys(groups).sort();
                sortedKeys.forEach(customerKey => {
                    const rows = groups[customerKey];
                    const titleRow = {};
                    selectedCols.forEach(c => {
                        if (c.key === 'customer') {
                            titleRow[c.key] = `【${customerKey}】`;
                        } else if (c.key === 'phone') {
                            titleRow[c.key] = `电话: ${customerKey}`;
                        } else {
                            titleRow[c.key] = '';
                        }
                    });
                    exportRows.push(titleRow);

                    rows.forEach(row => {
                        const rowData = {};
                        selectedCols.forEach(c => {
                            rowData[c.key] = row[c.key] !== undefined && row[c.key] !== null ? row[
                                c.key] : '';
                        });
                        exportRows.push(rowData);
                    });

                    const subRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            rows.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            subRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'customer') {
                            subRow[c.key] = `小计 (${customerKey})`;
                        } else if (c.key === 'phone') {
                            subRow[c.key] = '';
                        } else {
                            subRow[c.key] = '';
                        }
                    });
                    if (showCustomerTotal) {
                        const totalRow = {};
                        selectedCols.forEach(c => {
                            if (c.key === 'customer') {
                                totalRow[c.key] =
                                    `客户总金额: ${customerTotalMap[customerKey]?.toFixed(2) || '0.00'}`;
                            } else if (c.key === 'phone') {
                                totalRow[c.key] = '';
                            } else {
                                totalRow[c.key] = '';
                            }
                        });
                        exportRows.push(subRow);
                        exportRows.push(totalRow);
                    } else {
                        exportRows.push(subRow);
                    }

                    const emptyRow = {};
                    selectedCols.forEach(c => { emptyRow[c.key] = ''; });
                    exportRows.push(emptyRow);
                });

                if (showSummary) {
                    const totalRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            data.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            totalRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'customer') {
                            totalRow[c.key] = '总计（所有客户）';
                        } else if (c.key === 'phone') {
                            totalRow[c.key] = '';
                        } else {
                            totalRow[c.key] = '';
                        }
                    });
                    exportRows.push(totalRow);
                }
            } else if (groupByWarehouse && (dataType.includes('purchase') || dataType === 'stock')) {
                const groups = {};
                data.forEach(row => {
                    const wh = row.warehouse || '未指定';
                    if (!groups[wh]) groups[wh] = [];
                    groups[wh].push(row);
                });

                Object.keys(groups).forEach(wh => {
                    const rows = groups[wh];
                    const titleRow = {};
                    selectedCols.forEach(c => {
                        titleRow[c.key] = c.key === 'warehouse' ? `【${wh}】` : '';
                    });
                    exportRows.push(titleRow);

                    rows.forEach(row => {
                        const rowData = {};
                        selectedCols.forEach(c => {
                            rowData[c.key] = row[c.key] !== undefined && row[c.key] !== null ? row[
                                c.key] : '';
                        });
                        exportRows.push(rowData);
                    });

                    const subRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            rows.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            subRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'warehouse') {
                            subRow[c.key] = `小计 (${wh})`;
                        } else {
                            subRow[c.key] = '';
                        }
                    });
                    exportRows.push(subRow);

                    const emptyRow = {};
                    selectedCols.forEach(c => { emptyRow[c.key] = ''; });
                    exportRows.push(emptyRow);
                });

                if (showSummary) {
                    const totalRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            data.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            totalRow[c.key] = sum.toFixed(2);
                        } else if (c.key === 'warehouse') {
                            totalRow[c.key] = '总计';
                        } else {
                            totalRow[c.key] = '';
                        }
                    });
                    exportRows.push(totalRow);
                }
            } else {
                if (isRetail && showCustomerTotal) {
                    data.forEach(row => {
                        const key = row.phone || row.customer || '未指定客户';
                        const amt = parseFloat(row.payAmount) || 0;
                        if (!customerTotalMap[key]) customerTotalMap[key] = 0;
                        customerTotalMap[key] += amt;
                    });
                }

                data.forEach(row => {
                    const rowData = {};
                    selectedCols.forEach(c => {
                        rowData[c.key] = row[c.key] !== undefined && row[c.key] !== null ? row[c.key] : '';
                    });
                    if (isRetail && showCustomerTotal) {
                        const key = row.phone || row.customer || '未指定客户';
                        rowData['_customerTotal'] = customerTotalMap[key]?.toFixed(2) || '0.00';
                    }
                    exportRows.push(rowData);
                });

                if (showSummary && exportRows.length > 0) {
                    const totalRow = {};
                    selectedCols.forEach(c => {
                        if (numericCols.some(nc => nc.key === c.key)) {
                            let sum = 0;
                            data.forEach(r => {
                                const val = parseFloat(r[c.key]);
                                if (!isNaN(val)) sum += val;
                            });
                            totalRow[c.key] = sum.toFixed(2);
                        } else {
                            totalRow[c.key] = '';
                        }
                    });
                    if (selectedCols.length > 0) {
                        totalRow[selectedCols[0].key] = '汇总';
                    }
                    if (isRetail && showCustomerTotal) {
                        totalRow['_customerTotal'] = '';
                    }
                    exportRows.push(totalRow);
                }
            }

            const headerLabels = selectedCols.map(c => c.label);
            if (isRetail && showCustomerTotal) {
                headerLabels.push('客户总金额');
            }

            const excelData = [];
            excelData.push(headerLabels);

            exportRows.forEach(row => {
                const rowArr = selectedCols.map(c => {
                    let val = row[c.key];
                    if (val === undefined || val === null) val = '';
                    if (typeof val === 'number' && !Number.isInteger(val)) {
                        val = Number(val).toFixed(2);
                    }
                    return val;
                });
                if (isRetail && showCustomerTotal) {
                    rowArr.push(row['_customerTotal'] || '');
                }
                excelData.push(rowArr);
            });

            const ws = XLSX.utils.aoa_to_sheet(excelData);
            const colWidths = headerLabels.map(() => ({ wch: 16 }));
            ws['!cols'] = colWidths;

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '汇总表');

            const titleMap = {
                purchaseIn: '采购入库汇总表',
                purchaseExchange: '采购换货汇总表',
                purchaseReturn: '采购退货汇总表',
                retailOrder: '零售订单汇总表',
                retailSell: '零售开单汇总表',
                retailExchange: '零售换货汇总表',
                retailReturn: '零售退货汇总表',
                stock: '库存日报表',
                sampleDisplay: '门店上样汇总表',
                sampleSell: '样机销售汇总表'
            };

            const fileName = `${titleMap[dataType] || '导出数据'}.xlsx`;
            XLSX.writeFile(wb, fileName);
            closeModal();
        }

        // ===================================================================
        // 11. 页面就绪后更新库存
        // ===================================================================
        (function() {
            const checkAndUpdate = setInterval(async () => {
                if (dataReady) {
                    clearInterval(checkAndUpdate);
                    await updateStock();
                    if (currentPage === 'stock-daily') {
                        renderTable('stock');
                    }
                }
            }, 200);
        })();

        // 暴露函数
        window.toggleMenu = toggleMenu;
        window.showPage = showPage;
        window.openAddForm = openAddForm;
        window.editRow = editRow;
        window.saveRow = saveRow;
        window.updateRow = updateRow;
        window.deleteRow = deleteRow;
        window.closeModal = closeModal;
        window.importExcel = importExcel;
        window.handleFileImport = handleFileImport;
        window.exportExcel = exportExcel;
        window.renderTable = renderTable;
        window.autoFillByPhone = autoFillByPhone;
        window.onBrandInput = onBrandInput;
        window.onNameInput = onNameInput;
        window.toggleExportFields = toggleExportFields;
        window.updateExportFieldCount = updateExportFieldCount;
        window.generateExcel = generateExcel;
        window.jumpToRetailByProduct = jumpToRetailByProduct;
        window.openBaseAddForm = openBaseAddForm;
        window.saveBaseRow = saveBaseRow;
        window.editBaseRow = editBaseRow;
        window.updateBaseRow = updateBaseRow;
        window.deleteBaseRow = deleteBaseRow;
        window.renderBaseTable = renderBaseTable;
        window.doLogin = doLogin;
        window.doRegister = doRegister;
        window.importBaseExcel = importBaseExcel;
        window.handleBaseFileImport = handleBaseFileImport;
        window.toggleRepeatFilter = toggleRepeatFilter;
        window.getFilteredData = getFilteredData;
        window.batchDelete = batchDelete;
        window.toggleAllCheckboxes = toggleAllCheckboxes;
        window.updateBatchDeleteBtn = updateBatchDeleteBtn;
        window.renderDashboard = renderDashboard;
        window.refreshDashboard = refreshDashboard;
        window.setDashboardRange = setDashboardRange;
        window.updateProfile = updateProfile;
        window.logout = logout;
        window.selectAvatarColor = selectAvatarColor;
        window.filterUserLogs = filterUserLogs;
        window.clearLogFilter = clearLogFilter;
        window.exportUserLogs = exportUserLogs;
        window.exportUserData = exportUserData;
        window.importUserData = importUserData;
        window.exportDashboardExcel = exportDashboardExcel;
    </script>
</body>
